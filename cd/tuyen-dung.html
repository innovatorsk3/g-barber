<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <title>Tuyển Dụng · G - Barbershop</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <link rel="icon" href="assets/logo/logo_g.png">
  <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={theme:{extend:{colors:{brand:{DEFAULT:"#B91C1C",50:"#FDF2F2",500:"#DC2626",600:"#B91C1C",700:"#991B1B",800:"#7F1D1D",900:"#5C1313"}},fontFamily:{display:['"Playfair Display"','Georgia','serif'],sans:['Inter','system-ui','sans-serif']},boxShadow:{'brand-glow':'0 18px 40px -12px rgba(185,28,28,.55)','card-lift':'0 22px 60px -22px rgba(0,0,0,.7)'}}}};</script>
  <style>
    html,body{background:#18181B}body{font-family:Inter,system-ui,sans-serif;color:#FAFAFA;-webkit-font-smoothing:antialiased}
    .font-display{font-family:"Playfair Display",Georgia,serif}
    @keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:none}}
    .anim-up{animation:fadeUp .7s cubic-bezier(.22,1,.36,1) both}
    input,textarea,select{font-family:inherit}
    input:focus,textarea:focus,select:focus{outline:none;border-color:#B91C1C;box-shadow:0 0 0 3px rgba(185,28,28,.15)}
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" data-presets="env,react" src="_shared.jsx"></script>
  <script type="text/babel" data-presets="env,react">
    const ROLES = [
      { dept:"Barber", title:"Senior Barber", base:"Dĩ An · TP.HCM", type:"Full-time", salary:"15-25M",
        bullets:["Cắt fade nâng cao + cạo dao","Tối thiểu 3 năm kinh nghiệm","Có khách quen ưu tiên"] },
      { dept:"Barber", title:"Junior Barber", base:"Thủ Đức · TP.HCM", type:"Full-time", salary:"8-15M",
        bullets:["Tốt nghiệp Barber academy","Yêu nghề, học hỏi nhanh","Được đào tạo onboarding 2 tuần"] },
      { dept:"Lễ Tân", title:"Lễ Tân / Booking", base:"Dĩ An · TP.HCM", type:"Full-time", salary:"7-9M",
        bullets:["Giao tiếp tốt, ngoại hình ưa nhìn","Sử dụng tốt CRM / Excel","Ca xoay 8:00-21:00"] },
      { dept:"Marketing", title:"Content Creator / Editor", base:"Hybrid", type:"Part-time", salary:"6-10M",
        bullets:["Quay dựng TikTok / Reels","Có portfolio sản phẩm","Hiểu thẩm mỹ G — nam tính, mộc"] },
      { dept:"Quản lý", title:"Store Manager", base:"Dĩ An · TP.HCM", type:"Full-time", salary:"18-28M",
        bullets:["Có kinh nghiệm vận hành 2+ năm","Quản lý team 5-10 người","Có thưởng theo doanh thu"] },
    ];

    const PERKS = [
      { k:"Lương cứng + hoa hồng", v:"Hoa hồng 20-35% trên doanh thu cá nhân. Top barber thu nhập 30M+/tháng." },
      { k:"Đào tạo liên tục", v:"Tham gia G Academy miễn phí. Workshop hàng quý với khách mời quốc tế." },
      { k:"Bảo hiểm + ngày nghỉ", v:"BHYT, BHXH đầy đủ. 12 ngày phép/năm + sinh nhật + cưới hỏi." },
      { k:"Môi trường nam tính", v:"Đồng nghiệp tử tế, có gu. Không drama. Đề cao kỷ luật + tay nghề." },
      { k:"Lộ trình rõ ràng", v:"Junior → Senior → Master → Quản lý chi nhánh. Đánh giá 6 tháng/lần." },
      { k:"Dụng cụ + đồng phục", v:"Tặng bộ dụng cụ đầu vào trị giá 5M. Đồng phục 4 bộ/năm." },
    ];

    const RoleCard = ({ r, i }) => (
      <article className="anim-up group relative bg-zinc-800/50 border border-white/[0.06] rounded-2xl overflow-hidden hover:border-brand/40 hover:bg-zinc-800 transition-all duration-500" style={{animationDelay:`${0.05*i}s`}}>
        <div className="p-6 sm:p-7 flex flex-col h-full">
          <div className="flex items-start justify-between gap-3 mb-1">
            <span className="text-[9px] uppercase tracking-[0.22em] text-brand font-semibold">{r.dept}</span>
            <span className="text-[10px] uppercase tracking-[0.14em] text-zinc-400 border border-white/10 px-2 py-0.5 rounded-full">{r.type}</span>
          </div>
          <h3 className="font-display text-xl sm:text-2xl text-zinc-50 leading-tight mt-2">{r.title}</h3>
          <div className="mt-3 flex items-center gap-4 text-[12px] text-zinc-400">
            <span className="flex items-center gap-1.5"><Pin size={12} className="text-brand"/>{r.base}</span>
            <span className="font-display text-brand text-base">{r.salary}<span className="text-[10px] uppercase tracking-[0.14em] text-zinc-500 font-sans ml-1">/tháng</span></span>
          </div>
          <ul className="mt-5 space-y-2 flex-grow">
            {r.bullets.map(b => <li key={b} className="flex items-start gap-2.5 text-[13px] text-zinc-300"><Check size={13} className="text-brand mt-0.5 flex-shrink-0"/>{b}</li>)}
          </ul>
          <div className="mt-6 pt-5 border-t border-white/5 flex items-center justify-between gap-3">
            <span className="text-[10px] uppercase tracking-[0.18em] text-zinc-500">Đang tuyển</span>
            <a href="#apply" className="inline-flex items-center gap-2 text-[11px] uppercase tracking-[0.18em] font-semibold text-brand hover:text-white">Ứng tuyển <ArrowUR size={13}/></a>
          </div>
        </div>
      </article>
    );

    const App = () => {
      const [dept, setDept] = useState("Tất cả");
      const depts = ["Tất cả", ...new Set(ROLES.map(r => r.dept))];
      const filtered = dept === "Tất cả" ? ROLES : ROLES.filter(r => r.dept === dept);
      return (
        <div className="min-h-screen">
          <Header active="tuyendung" onCta={() => window.location.href='tel:0947947168'}/>
          <PageHero kicker="Tuyển dụng · Join the crew"
            title={<><span>Trở thành</span><span className="block italic font-light text-brand">một phần của G.</span></>}
            body="G đang tìm những người yêu nghề, có gu, sẵn sàng phát triển cùng một thương hiệu Barbershop hàng đầu. Lương tốt — môi trường tử tế — lộ trình rõ ràng."
            img="assets/team/1.jpg"/>

          <section className="px-5 sm:px-8 -mt-8 sm:-mt-10 relative z-10">
            <div className="max-w-5xl mx-auto grid grid-cols-3 gap-px bg-white/10 rounded-2xl overflow-hidden border border-white/10">
              {[{n:"5",l:"Vị trí mở"},{n:"3",l:"Chi nhánh"},{n:"50+",l:"Nhân viên"}].map(s=>(
                <div key={s.l} className="bg-zinc-900 px-4 py-5 text-center">
                  <div className="font-display text-2xl sm:text-3xl text-brand">{s.n}</div>
                  <div className="mt-1 text-[10px] uppercase tracking-[0.18em] text-zinc-500">{s.l}</div>
                </div>
              ))}
            </div>
          </section>

          {/* Perks */}
          <section className="px-5 sm:px-8 py-16 sm:py-24">
            <div className="max-w-6xl mx-auto">
              <SectionLabel kicker="Quyền lợi" title={<>Vì sao chọn <span className="italic font-light text-brand">làm tại G?</span></>}/>
              <div className="mt-10 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 sm:gap-5">
                {PERKS.map((p,i) => (
                  <div key={p.k} className="anim-up p-6 rounded-2xl bg-zinc-800/60 border border-white/[0.06] hover:border-brand/40 transition-all" style={{animationDelay:`${0.04*i}s`}}>
                    <div className="font-display text-brand text-3xl italic leading-none mb-3">0{i+1}</div>
                    <h3 className="font-display text-lg text-zinc-50 leading-snug">{p.k}</h3>
                    <p className="mt-2 text-sm text-zinc-400 leading-relaxed">{p.v}</p>
                  </div>
                ))}
              </div>
            </div>
          </section>

          {/* Roles */}
          <section className="bg-zinc-900 border-y border-white/5 px-5 sm:px-8 py-16 sm:py-24">
            <div className="max-w-6xl mx-auto">
              <div className="flex flex-col sm:flex-row sm:items-end sm:justify-between gap-6 mb-10">
                <SectionLabel kicker="Vị trí đang tuyển" title={<>5 vị trí <span className="italic font-light text-brand">đang mở</span></>}/>
                <div className="flex flex-wrap gap-2">
                  {depts.map(d => (
                    <button key={d} onClick={()=>setDept(d)} className={`text-[10px] uppercase tracking-[0.18em] font-semibold px-4 py-2 rounded-full border transition-all ${dept===d ? "bg-brand border-brand text-white" : "border-white/10 text-zinc-400 hover:text-white hover:border-white/30"}`}>{d}</button>
                  ))}
                </div>
              </div>
              <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 sm:gap-5">
                {filtered.map((r,i) => <RoleCard key={r.title} r={r} i={i}/>)}
              </div>
            </div>
          </section>

          {/* Application form */}
          <section id="apply" className="px-5 sm:px-8 py-16 sm:py-24">
            <div className="max-w-3xl mx-auto">
              <SectionLabel center kicker="Ứng tuyển" title={<>Gửi CV cho <span className="italic font-light text-brand">G</span></>}
                body="Hoặc gửi trực tiếp về gbarber.hcm@gmail.com — tiêu đề: [Vị trí ứng tuyển] - Họ tên."/>
              <form onSubmit={(e)=>{e.preventDefault();alert("Cảm ơn! Bộ phận tuyển dụng sẽ liên hệ trong 48h.");}} className="mt-10 p-6 sm:p-8 rounded-2xl bg-zinc-800/50 border border-white/[0.06] space-y-5">
                <div className="grid sm:grid-cols-2 gap-5">
                  <label className="block"><span className="text-[10px] uppercase tracking-[0.18em] text-zinc-400 font-semibold">Họ tên</span>
                    <input required type="text" className="mt-2 w-full h-11 px-4 bg-zinc-900 border border-white/10 rounded-lg text-white text-sm transition-all" placeholder="Nguyễn Văn A"/></label>
                  <label className="block"><span className="text-[10px] uppercase tracking-[0.18em] text-zinc-400 font-semibold">Số điện thoại</span>
                    <input required type="tel" className="mt-2 w-full h-11 px-4 bg-zinc-900 border border-white/10 rounded-lg text-white text-sm transition-all" placeholder="0947 947 168"/></label>
                </div>
                <label className="block"><span className="text-[10px] uppercase tracking-[0.18em] text-zinc-400 font-semibold">Email</span>
                  <input required type="email" className="mt-2 w-full h-11 px-4 bg-zinc-900 border border-white/10 rounded-lg text-white text-sm transition-all" placeholder="ban@email.com"/></label>
                <label className="block"><span className="text-[10px] uppercase tracking-[0.18em] text-zinc-400 font-semibold">Vị trí ứng tuyển</span>
                  <select className="mt-2 w-full h-11 px-4 bg-zinc-900 border border-white/10 rounded-lg text-white text-sm transition-all">
                    {ROLES.map(r => <option key={r.title}>{r.title}</option>)}
                  </select></label>
                <label className="block"><span className="text-[10px] uppercase tracking-[0.18em] text-zinc-400 font-semibold">Giới thiệu bản thân</span>
                  <textarea rows="4" className="mt-2 w-full p-4 bg-zinc-900 border border-white/10 rounded-lg text-white text-sm resize-none transition-all" placeholder="Kinh nghiệm, kỹ năng, mong muốn..."></textarea></label>
                <label className="flex items-center gap-3 px-4 h-14 bg-zinc-900 border border-dashed border-white/15 rounded-lg cursor-pointer hover:border-brand/50 transition-all">
                  <span className="w-9 h-9 rounded-full bg-brand/15 text-brand flex items-center justify-center"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg></span>
                  <div><div className="text-sm text-white font-medium">Đính kèm CV (PDF / DOC)</div><div className="text-[11px] text-zinc-500">Tối đa 5MB</div></div>
                  <input type="file" className="hidden"/></label>
                <Btn as="button" type="submit" variant="primary" className="w-full" icon={<ArrowUR size={13}/>}>Gửi đơn ứng tuyển</Btn>
                <p className="text-[11px] text-zinc-500 text-center">Bộ phận HR phản hồi trong 48h làm việc.</p>
              </form>
            </div>
          </section>

          <Footer/>
          <BottomNav active="tuyendung" onCta={() => window.location.href='tel:0947947168'}/>
        </div>
      );
    };
    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
