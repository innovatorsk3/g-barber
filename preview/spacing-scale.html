<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:24px; background:var(--bg-primary); font-family:var(--font-body); }
  .stack { display:flex; flex-direction:column; gap:8px; }
  .row { display:flex; align-items:center; gap:14px; }
  .bar { background:var(--accent); height:14px; }
  .name { font-family:"JetBrains Mono",monospace; font-size:10px; color:var(--text-muted); width:80px; flex-shrink:0; }
  .val { font-family:"JetBrains Mono",monospace; font-size:10px; color:var(--text-primary); width:64px; flex-shrink:0; text-align:right; }
</style></head>
<body>
  <div class="stack">
    <div class="row"><div class="name">4xs</div><div class="bar" style="width:4px"></div><div class="val">4px</div></div>
    <div class="row"><div class="name">3xs</div><div class="bar" style="width:8px"></div><div class="val">8px</div></div>
    <div class="row"><div class="name">xs</div><div class="bar" style="width:12px"></div><div class="val">12px</div></div>
    <div class="row"><div class="name">sm</div><div class="bar" style="width:16px"></div><div class="val">16px</div></div>
    <div class="row"><div class="name">md</div><div class="bar" style="width:24px"></div><div class="val">24px</div></div>
    <div class="row"><div class="name">lg</div><div class="bar" style="width:40px"></div><div class="val">40px</div></div>
    <div class="row"><div class="name">xl</div><div class="bar" style="width:60px"></div><div class="val">60px · container-px</div></div>
    <div class="row"><div class="name">section-py</div><div class="bar" style="width:112px"></div><div class="val">clamp 48–112</div></div>
  </div>
</body></html>
