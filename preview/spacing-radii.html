<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:20px 24px; background:var(--bg-primary); font-family:var(--font-body); }
  .grid { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; }
  .r { display:flex; flex-direction:column; gap:8px; align-items:flex-start; }
  .box { background:#fff; border:1px solid var(--border); width:100%; height:48px; }
  .meta { font-family:"JetBrains Mono",monospace; font-size:10px; color:var(--text-muted); }
  .name { font-size:11px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; color:var(--text-primary); }
  .pillrow { display:flex; gap:10px; margin-top:14px; align-items:center; }
  .pill { background:var(--accent); color:#fff; height:44px; padding:0 26px; border-radius:9999px; display:inline-flex; align-items:center; font-size:11px; font-weight:700; letter-spacing:.15em; text-transform:uppercase; }
</style></head>
<body>
  <div class="grid">
    <div class="r"><div class="box" style="border-radius:6px"></div><div class="name">sm</div><div class="meta">6px · chips</div></div>
    <div class="r"><div class="box" style="border-radius:10px"></div><div class="name">default</div><div class="meta">10px · cards</div></div>
    <div class="r"><div class="box" style="border-radius:16px"></div><div class="name">lg</div><div class="meta">16px · hero wells</div></div>
    <div class="r"><div class="box" style="border-radius:9999px"></div><div class="name">full</div><div class="meta">∞ · buttons</div></div>
  </div>
  <div class="pillrow">
    <span class="pill">ĐẶT LỊCH HẸN</span>
    <span style="font-size:11px;color:var(--text-muted);letter-spacing:.04em">Primary buttons are always full-radius pills.</span>
  </div>
</body></html>
