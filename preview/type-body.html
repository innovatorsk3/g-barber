<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:24px; background:var(--bg-primary); font-family:var(--font-body); color:var(--text-secondary); }
  .stack { display:flex; flex-direction:column; gap:14px; }
  .row { display:flex; gap:18px; align-items:flex-start; }
  .meta { width:96px; flex-shrink:0; font-family:"JetBrains Mono",monospace; font-size:10px; color:var(--text-muted); padding-top:4px; }
  .body  { font-family:var(--font-body); font-size:15px; line-height:1.7; color:var(--text-secondary); max-width:480px; }
  .cap   { font-family:var(--font-body); font-size:11px; font-weight:600; letter-spacing:.15em; text-transform:uppercase; color:var(--text-muted); }
  .lbl   { font-family:var(--font-body); font-size:12px; font-weight:700; letter-spacing:.2em; text-transform:uppercase; color:var(--accent); }
  .testi { font-family:var(--font-display); font-size:18px; font-style:italic; line-height:1.65; color:var(--text-secondary); max-width:480px; }
</style></head>
<body>
  <div class="stack">
    <div class="row"><div class="meta">LABEL</div><div class="lbl">Đội Ngũ Barber</div></div>
    <div class="row"><div class="meta">BODY · 15</div><div class="body">G - Barbershop kết hợp giữa phong cách cổ điển &amp; hiện đại, mang đến không gian thân thiện, gần gũi nhưng không kém phần chuyên nghiệp.</div></div>
    <div class="row"><div class="meta">TESTIMONIAL</div><div class="testi">&ldquo;Chuyên nghiệp nhưng không hề công nghiệp.&rdquo;</div></div>
    <div class="row"><div class="meta">CAPTION</div><div class="cap">8:00 – 21:00 · Thứ 2 – CN</div></div>
  </div>
</body></html>
