<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:22px; background:var(--bg-primary); font-family:var(--font-body); display:flex; flex-direction:column; gap:14px; }
  .tag { display:inline-flex; align-items:center; padding:6px 16px; font-family:var(--font-body); font-size:10px; font-weight:600; letter-spacing:.18em; text-transform:uppercase; background:rgba(185,28,28,.09); border:1px solid rgba(185,28,28,.18); border-radius:9999px; color:var(--accent); }
  .tag-dark { background:rgba(185,28,28,.18); border-color:rgba(185,28,28,.38); }
  .tag-cs   { background:rgba(255,255,255,.92); border-color:rgba(0,0,0,.06); color:var(--text-primary); padding:3px 10px; font-size:10px; backdrop-filter:blur(4px); }
  .accent-line { width:40px; height:2px; background:var(--accent); display:block; }
  .row { display:flex; gap:12px; align-items:center; flex-wrap:wrap; }
  .panel { background:#0F0E0D; padding:14px 18px; border-radius:10px; display:flex; gap:12px; align-items:center; }
  .label { font-size:10px; letter-spacing:.12em; text-transform:uppercase; color:var(--text-muted); width:90px; flex-shrink:0; }
  .stack-hdr { display:flex; flex-direction:column; gap:8px; }
  .h2 { font-family:var(--font-display); font-weight:500; letter-spacing:.04em; text-transform:uppercase; font-size:22px; color:var(--text-primary); }
</style></head>
<body>
  <div class="row"><div class="label">Section tag</div><span class="tag">Đội Ngũ Barber</span><span class="tag">Bảng Giá</span></div>
  <div class="panel"><div class="label" style="color:rgba(255,255,255,.55)">On dark</div><span class="tag tag-dark">Đội Ngũ Barber</span></div>
  <div class="row"><div class="label">Branch chip</div><span class="tag-cs">CS 1</span><span class="tag-cs">CS 2</span><span class="tag-cs">CS 3</span></div>
  <div class="row"><div class="label">Eyebrow combo</div>
    <div class="stack-hdr">
      <span class="tag">Dịch Vụ</span>
      <span class="accent-line"></span>
      <span class="h2">Dịch Vụ Của Chúng Tôi</span>
    </div>
  </div>
</body></html>
