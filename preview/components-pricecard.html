<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:24px; background:var(--bg-primary); font-family:var(--font-body); }
  .wrap { background:#fff; border:1px solid var(--border); border-radius:10px; overflow:hidden; box-shadow:0 4px 16px rgba(0,0,0,.05); }
  .head { padding:14px 18px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
  .h3 { font-family:var(--font-display); font-weight:500; letter-spacing:.03em; font-size:16px; color:var(--text-primary); margin:0; text-transform:uppercase; }
  .from { font-family:"JetBrains Mono",monospace; font-size:10px; color:var(--text-muted); }
  .row { display:flex; align-items:center; justify-content:space-between; padding:11px 18px; border-bottom:1px dashed var(--border); }
  .row:last-child { border-bottom:none; }
  .svc { font-family:var(--font-body); font-size:13px; color:var(--text-secondary); }
  .price { font-family:var(--font-display); font-weight:600; font-size:15px; letter-spacing:.04em; color:var(--accent); }
</style></head>
<body>
  <div class="wrap">
    <div class="head"><h3 class="h3">Combo – Gói</h3><span class="from">FROM 40K</span></div>
    <div class="row"><span class="svc">Combo: Cắt-Xả-Tạo Kiểu</span><span class="price">60K</span></div>
    <div class="row"><span class="svc">Combo SV năm 1: Cắt-Xả-Tạo Kiểu</span><span class="price">40K</span></div>
    <div class="row"><span class="svc">Cắt Trẻ em</span><span class="price">20 – 30K</span></div>
    <div class="row"><span class="svc">Gói Phục Hồi</span><span class="price">100K</span></div>
  </div>
</body></html>
