<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:20px 22px; background:var(--bg-primary); font-family:var(--font-body); }
  .stack { display:flex; flex-direction:column; gap:14px; }
  .row { display:flex; align-items:center; gap:14px; }
  .swatch { width:36px; height:36px; border-radius:50%; flex-shrink:0; border:1px solid var(--border); }
  .meta  { display:flex; flex-direction:column; gap:2px; flex:1; }
  .name { font-size:11px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; color:var(--text-primary); }
  .hex  { font-family:"JetBrains Mono",monospace; font-size:10px; color:var(--text-muted); }
  .sample { font-family:var(--font-body); font-size:13px; flex:1; text-align:right; }
</style></head>
<body>
  <div class="stack">
    <div class="row"><div class="swatch" style="background:#1C1410"></div><div class="meta"><div class="name">text-primary</div><div class="hex">#1C1410</div></div><div class="sample" style="color:#1C1410">Headlines & body emphasis</div></div>
    <div class="row"><div class="swatch" style="background:#3D3530"></div><div class="meta"><div class="name">text-secondary</div><div class="hex">#3D3530</div></div><div class="sample" style="color:#3D3530">Default paragraph copy</div></div>
    <div class="row"><div class="swatch" style="background:#6B6058"></div><div class="meta"><div class="name">text-muted</div><div class="hex">#6B6058</div></div><div class="sample" style="color:#6B6058">Captions, meta, hours</div></div>
    <div class="row"><div class="swatch" style="background:#9C9188"></div><div class="meta"><div class="name">text-faint</div><div class="hex">#9C9188</div></div><div class="sample" style="color:#9C9188">Inactive tabs, placeholders</div></div>
  </div>
</body></html>
