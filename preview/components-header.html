<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:0; background:var(--bg-primary); font-family:var(--font-body); }
  .header { position:relative; height:80px; display:flex; align-items:center; padding:0 24px; background:rgba(250,248,245,.92); backdrop-filter:blur(20px) saturate(160%); border-bottom:1px solid var(--border); justify-content:space-between; }
  .logo { display:flex; align-items:center; gap:10px; }
  .logo img { height:46px; width:auto; }
  .brand { font-family:var(--font-display); font-size:18px; letter-spacing:.08em; }
  .brand .g { color:var(--accent); font-weight:600; font-size:20px; }
  .brand .rest { color:var(--text-muted); font-weight:400; }
  .nav { display:flex; gap:36px; }
  .nav a { font-family:var(--font-body); font-size:11px; font-weight:600; letter-spacing:.1em; text-transform:uppercase; color:var(--text-secondary); position:relative; padding:6px 0; text-decoration:none; }
  .nav a.active { color:var(--accent); }
  .nav a.active::after { content:""; position:absolute; left:0; right:0; bottom:0; height:1.5px; background:var(--accent); }
  .cta { display:inline-flex; align-items:center; gap:8px; background:var(--accent); color:#fff; padding:0 22px; height:44px; border-radius:9999px; font-size:11px; font-weight:600; letter-spacing:.1em; }
  .ph { width:14px; height:14px; border:1.5px solid currentColor; border-radius:3px; }
</style></head>
<body>
  <div class="header">
    <div class="logo">
      <img src="../assets/logo/logo_g.png" alt="">
      <span class="brand"><span class="g">G</span><span class="rest"> - BARBERSHOP</span></span>
    </div>
    <nav class="nav"><a class="active" href="#">Trang Chủ</a><a href="#">Về Chúng Tôi</a></nav>
    <a class="cta" href="#"><span class="ph"></span>0947 947 168</a>
  </div>
</body></html>
