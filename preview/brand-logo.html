<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:24px; background:var(--bg-primary); font-family:var(--font-body); display:flex; align-items:center; gap:28px; }
  .mark { display:flex; align-items:center; gap:14px; }
  .mark img { height:80px; width:auto; }
  .word { font-family:var(--font-display); font-size:28px; letter-spacing:.08em; line-height:1; }
  .word .g { color:var(--accent); font-weight:600; font-size:34px; }
  .word .rest { color:var(--text-muted); font-weight:400; }
  .tag { font-family:var(--font-body); font-size:9px; font-weight:700; letter-spacing:.35em; color:var(--text-muted); text-transform:uppercase; margin-top:6px; }
  .ext { font-family:"JetBrains Mono",monospace; font-size:10px; color:var(--text-faint); }
</style></head>
<body>
  <div class="mark">
    <img src="../assets/logo/logo_g.png" alt="G - Barbershop">
    <div>
      <div class="word"><span class="g">G</span><span class="rest"> - BARBERSHOP</span></div>
      <div class="tag">✦ TÓC ĐẸP TỪ TÂM ✦</div>
    </div>
  </div>
  <div class="ext">logo_g.png · raster · request SVG</div>
</body></html>
