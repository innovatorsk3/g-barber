<!doctype html>

<style>

  .row { display:flex; align-items:center; gap:14px; padding:6px 0; border-bottom:1px dashed var(--border); }
  .row:last-child { border-bottom:none; }
  .ic { width:40px; display:flex; justify-content:center; color:var(--text-primary); }
  .ic svg { width:22px; height:22px; }
  .name { font-size:11px; font-weight:700; letter-spacing:.12em; text-transform:uppercase; color:var(--text-primary); width:170px; flex-shrink:0; }
  .desc { font-size:12px; color:var(--text-muted); line-height:1.5; }
  .pkg { font-family:"JetBrains Mono",monospace; font-size:10px; color:var(--text-muted); margin-left:auto; }
</style></head>
