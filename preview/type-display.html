<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">

<body>

    <div class="row"><div class="meta">H2 · 32</div><div class="display" style="font-size:28px;font-weight:500;letter-spacing:.04em">Hệ Thống Chi Nhánh</div></div>
    <div class="row"><div class="meta">H3 · 22</div><div class="display" style="font-size:20px;font-weight:500;letter-spacing:.03em;text-transform:none">Combo Cắt-Xả-Tạo Kiểu</div></div>
