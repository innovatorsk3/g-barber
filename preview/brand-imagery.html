<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:0; background:var(--bg-primary); font-family:var(--font-body); }
  .grid { display:grid; grid-template-columns:repeat(3,1fr); gap:6px; padding:8px; }
  .cell { aspect-ratio:1; background:#ddd center/cover no-repeat; border-radius:4px; position:relative; overflow:hidden; }
  .cell::after { content:""; position:absolute; inset:0; background:linear-gradient(180deg,transparent 60%,rgba(0,0,0,.55)); }
  .lbl { position:absolute; left:8px; bottom:6px; z-index:2; color:#fff; font-family:var(--font-display); font-size:11px; letter-spacing:.06em; }
</style></head>
<body>
  <div class="grid">
    <div class="cell" style="background-image:url(../assets/gallery/3.jpg)"><span class="lbl">Classic Pompadour</span></div>
    <div class="cell" style="background-image:url(../assets/gallery/4.jpg)"><span class="lbl">Undercut</span></div>
    <div class="cell" style="background-image:url(../assets/gallery/5.jpg)"><span class="lbl">Korean Perm</span></div>
    <div class="cell" style="background-image:url(../assets/gallery/6.jpg)"><span class="lbl">Side Part</span></div>
    <div class="cell" style="background-image:url(../assets/branches/cn1.jpg)"><span class="lbl">Lương Đình Của</span></div>
    <div class="cell" style="background-image:url(../assets/branches/cn3.jpg)"><span class="lbl">Nguyễn Hiền</span></div>
  </div>
</body></html>
