<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:18px; background:var(--bg-primary); font-family:var(--font-body); }
  .row { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; }
  .sw { display:flex; flex-direction:column; gap:6px; }
  .chip { aspect-ratio: 16/9; border-radius:8px; border:1px solid var(--border); position:relative; overflow:hidden; }
  .name { font-size:11px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; color:var(--text-primary); }
  .hex  { font-family:"JetBrains Mono",monospace; font-size:10px; color:var(--text-muted); }
</style></head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:#FAF8F5"></div><div class="name">bg-primary</div><div class="hex">#FAF8F5 · page</div></div>
    <div class="sw"><div class="chip" style="background:#F3EEE8"></div><div class="name">bg-secondary</div><div class="hex">#F3EEE8 · alt</div></div>
    <div class="sw"><div class="chip" style="background:#FFFFFF"></div><div class="name">bg-card</div><div class="hex">#FFFFFF · card</div></div>
    <div class="sw"><div class="chip" style="background:#E8E3DC"></div><div class="name">border</div><div class="hex">#E8E3DC</div></div>
    <div class="sw"><div class="chip" style="background:#0F0E0D"></div><div class="name" style="color:#0F0E0D">bg-dark</div><div class="hex">#0F0E0D · footer</div></div>
    <div class="sw"><div class="chip" style="background:#1A1714"></div><div class="name">bg-dark-2</div><div class="hex">#1A1714</div></div>
    <div class="sw"><div class="chip" style="background:#1C1410"></div><div class="name">text-primary</div><div class="hex">#1C1410</div></div>
    <div class="sw"><div class="chip" style="background:#6B6058"></div><div class="name">text-muted</div><div class="hex">#6B6058</div></div>
  </div>
</body></html>
