<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:0; background:var(--bg-dark); color:#fff; font-family:var(--font-body); min-height:100vh; display:flex; flex-direction:column; gap:18px; padding:24px 28px; }
  .stars { display:flex; gap:6px; font-size:18px; color:var(--accent-gold); }
  .quote { font-family:var(--font-display); font-style:italic; font-size:22px; line-height:1.55; color:rgba(255,255,255,.92); }
  .name { font-family:var(--font-body); font-size:11px; font-weight:600; letter-spacing:.15em; text-transform:uppercase; color:rgba(255,255,255,.45); }
  .dots { display:flex; gap:6px; }
  .dot { width:6px; height:6px; border-radius:50%; background:rgba(255,255,255,.25); }
  .dot.active { width:22px; border-radius:3px; background:var(--accent); }
</style></head>
<body>
  <div class="stars">★ ★ ★ ★ ★</div>
  <div class="quote">&ldquo;Kiểu tóc cắt bởi G - Barbershop luôn luôn là kiểu tóc mình ưng ý nhất. Chuyên nghiệp nhưng không hề công nghiệp.&rdquo;</div>
  <div class="name">— Nguyễn Hải Nam</div>
  <div class="dots"><span class="dot active"></span><span class="dot"></span><span class="dot"></span></div>
</body></html>
